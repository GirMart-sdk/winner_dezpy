<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test API - Winner Store</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #e8ff47;
    }
    .test-section {
      background: #222;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border: 1px solid #333;
    }
    button {
      background: #e8ff47;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #d4e030;
    }
    .result {
      background: #111;
      padding: 15px;
      margin: 10px 0;
      border-radius: 4px;
      border-left: 4px solid #e8ff47;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }
    .success { border-left-color: #2ecc71; }
    .error { border-left-color: #e74c3c; }
    .info { border-left-color: #3498db; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Test API - Winner Store</h1>
    
    <div class="test-section">
      <h2>1. Test Conexión</h2>
      <button onclick="testConnection()">Test Connection</button>
      <div id="result1" class="result"></div>
    </div>

    <div class="test-section">
      <h2>2. Test API /products</h2>
      <button onclick="testProducts()">Test Products Endpoint</button>
      <div id="result2" class="result"></div>
    </div>

    <div class="test-section">
      <h2>3. Test with apiFetch (como en app.js)</h2>
      <button onclick="testApiFetch()">Test apiFetch()</button>
      <div id="result3" class="result"></div>
    </div>

    <div class="test-section">
      <h2>4. Información del Navegador</h2>
      <button onclick="showBrowserInfo()">Show Info</button>
      <div id="result4" class="result"></div>
    </div>
  </div>

  <script>
    const API_URL = (() => {
      const origin = window.location.origin.startsWith("file:")
        ? "http://localhost:3000"
        : window.location.origin;
      return `${origin.replace(/\/$/, "")}/api`;
    })();

    const API_KEY = window.API_KEY || localStorage.getItem("w_api_key") || "dev-api-key";
    
    const apiFetch = (url, options = {}) =>
      fetch(url, {
        ...options,
        headers: { ...(options.headers || {}), "x-api-key": API_KEY },
      });

    function log(elementId, text, type = "info") {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.className = `result ${type}`;
    }

    async function testConnection() {
      log("result1", "⏳ Testing...", "info");
      try {
        const res = await fetch("http://localhost:3000");
        log("result1", `✅ Connection successful!\nStatus: ${res.status}\nURL: http://localhost:3000`, "success");
      } catch (err) {
        log("result1", `❌ Connection failed!\nError: ${err.message}`, "error");
      }
    }

    async function testProducts() {
      log("result2", "⏳ Fetching products...", "info");
      try {
        const res = await fetch("http://localhost:3000/api/products", {
          headers: { "x-api-key": "dev-api-key" }
        });
        const data = await res.json();
        const count = Array.isArray(data) ? data.length : 0;
        log("result2", `✅ Success!\nStatus: ${res.status}\nProducts: ${count}\nFirst: ${data[0]?.name || "N/A"}`, "success");
      } catch (err) {
        log("result2", `❌ Error!\n${err.message}`, "error");
      }
    }

    async function testApiFetch() {
      log("result3", "⏳ Testing with apiFetch...", "info");
      try {
        console.log("🔄 API_URL:", API_URL);
        console.log("🔑 API_KEY:", API_KEY);
        const res = await apiFetch(`${API_URL}/products`);
        const data = await res.json();
        const count = Array.isArray(data) ? data.length : 0;
        log("result3", `✅ Success with apiFetch!\nAPI_URL: ${API_URL}\nAPI_KEY: ${API_KEY}\nStatus: ${res.status}\nProducts: ${count}`, "success");
      } catch (err) {
        log("result3", `❌ Error!\n${err.message}`, "error");
      }
    }

    function showBrowserInfo() {
      const info = `
Browser: ${navigator.userAgent}
API_URL: ${API_URL}
API_KEY: ${API_KEY}
localStorage API_KEY: ${localStorage.getItem("w_api_key")}
window.API_URL: ${window.API_URL}
Current URL: ${window.location}
      `.trim();
      log("result4", info, "info");
    }
  </script>
</body>
</html>
