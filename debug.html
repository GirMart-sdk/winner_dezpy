<!DOCTYPE html>
<html>
<head>
  <title>Debug Winner API</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
    .log { margin: 10px 0; padding: 10px; background: #0a0a0a; border: 1px solid #0f0; }
    .error { color: #f00; }
    .ok { color: #0f0; }
  </style>
</head>
<body>
  <h2>🔧 Debug Winner API</h2>
  <div id="output"></div>

  <script>
    const out = document.getElementById('output');
    function log(msg, type = 'info') {
      const cls = type === 'error' ? 'error' : type === 'ok' ? 'ok' : '';
      out.innerHTML += `<div class="log ${cls}">${msg}</div>`;
      console.log(msg);
    }

    const API_URL = (() => {
      const origin = window.location.origin.startsWith("file:")
        ? "http://localhost:3000"
        : window.location.origin;
      return `${origin.replace(/\/$/, "")}/api`;
    })();
    
    const API_KEY = "dev-api-key";

    log(`🔗 API URL: ${API_URL}`, 'info');
    log(`🔑 API KEY: ${API_KEY}`, 'info');

    // Test 1: Sin headers
    async function test1() {
      log('<br>==== TEST 1: Sin API Key ====', 'info');
      try {
        const res = await fetch(`${API_URL}/products`);
        const data = await res.json();
        log(`Status: ${res.status}`, res.ok ? 'ok' : 'error');
        log(`Response: ${JSON.stringify(data).substring(0, 100)}...`, res.ok ? 'ok' : 'error');
      } catch(e) {
        log(`Error: ${e.message}`, 'error');
      }
    }

    // Test 2: Con headers
    async function test2() {
      log('<br>==== TEST 2: Con API Key ====', 'info');
      try {
        const res = await fetch(`${API_URL}/products`, {
          headers: { 'x-api-key': API_KEY }
        });
        const data = await res.json();
        log(`Status: ${res.status}`, res.ok ? 'ok' : 'error');
        if (res.ok && Array.isArray(data)) {
          log(`✓ Productos encontrados: ${data.length}`, 'ok');
          log(`Primer producto: ${data[0].name} - $${data[0].price}`, 'ok');
        } else {
          log(`Response: ${JSON.stringify(data).substring(0, 100)}...`, res.ok ? 'ok' : 'error');
        }
      } catch(e) {
        log(`Error: ${e.message}`, 'error');
      }
    }

    // Test 3: Con Content-Type
    async function test3() {
      log('<br>==== TEST 3: Con Content-Type + API Key ====', 'info');
      try {
        const res = await fetch(`${API_URL}/products`, {
          headers: { 
            'Content-Type': 'application/json',
            'x-api-key': API_KEY 
          }
        });
        const data = await res.json();
        log(`Status: ${res.status}`, res.ok ? 'ok' : 'error');
        if (res.ok && Array.isArray(data)) {
          log(`✓ Productos encontrados: ${data.length}`, 'ok');
        } else {
          log(`Response: ${JSON.stringify(data).substring(0, 100)}...`, res.ok ? 'ok' : 'error');
        }
      } catch(e) {
        log(`Error: ${e.message}`, 'error');
      }
    }

    // Ejecutar tests
    (async () => {
      await test1();
      await test2();
      await test3();
      log('<br>✓ Tests completados', 'ok');
    })();
  </script>
</body>
</html>
